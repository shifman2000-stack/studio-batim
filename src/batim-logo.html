<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300&family=Heebo:wght@200&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #f7f5f2; display: flex; align-items: center; justify-content: center; height: 100vh; }
  .logo { display: flex; align-items: center; gap: 0; direction: rtl; }
  .logo-text { font-family: 'Rubik', sans-serif; font-weight: 300; font-size: 30px; letter-spacing: 0.06em; color: #1a1a18; line-height: 1; white-space: nowrap; }
  .divider { display: block; width: 1px; height: 28px; flex-shrink: 0; background: linear-gradient(to bottom, transparent, #c8bfb0 25%, #c8bfb0 75%, transparent); margin: 0 16px; }
  .byline { font-family: 'Heebo', sans-serif; font-weight: 200; font-size: 9px; letter-spacing: 0.28em; color: #8a8680; direction: ltr; white-space: nowrap; }
</style>
</head>
<body>
  <div class="logo">
    <span class="logo-text">סטודיו בתים</span>
    <span class="divider"></span>
    <span class="byline">BY EINAV SHIFMAN</span>
  </div>
</body>
</html>
